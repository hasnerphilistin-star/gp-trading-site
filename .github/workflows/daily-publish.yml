name: Publicar artículo diario

on:
  schedule:
    - cron: '0 8 * * *'
    - cron: '0 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configurar git
        run: |
          git config user.name "GP Trading Bot"
          git config user.email "bot@gptradingfx.pages.dev"

      - name: Publicar siguiente artículo
        run: node scripts/publish-today.cjs
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
